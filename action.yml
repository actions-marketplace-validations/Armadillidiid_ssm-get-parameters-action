name: "ssm-get-parameters-action"
description: "Resolve parameters from AWS SSM Parameter Store and exports them as environment variables."
author: "Emmanuel Isenah <emmanuelisenah@gmail.com> (https://emmanuelisenah.com)"

branding:
  icon: "sliders"
  color: "orange"

inputs:
  secret:
    description: "A mapping of environment variable names to their corresponding AWS SSM parameter paths. This can be provided as a JSON object or as key-value pairs"
    required: true
    default: "World"
  with-decryption:
    description: "If set to true, retrieves decrypted values for secure string parameters."
    required: false
    default: "false"
  parameter-prefix:
    description: "An optional prefix to filter SSM parameter names. Only parameters matching this prefix will be fetched."
    required: false
    default: ""
  env-file-path:
    description: "The directory path where the .env file will be saved. If not provided, no .env file is created."
    required: false
    default: ""
  is-json:
    description: "Indicates whether the provided secret is in JSON format. Set to true if the secret is a JSON object."
    required: false
    default: "false"
  by-path:
    description: "When set to true, the secret input is treated as a single SSM parameter path. All parameters under that path are fetched recursively using GetParametersByPath. Mutually exclusive with individual parameter mode."
    required: false
    default: "false"
  transform-keys:
    description: "When set to true, converts all environment variable keys to UPPER_SNAKE_CASE. Applies to both individual and path-based modes."
    required: false
    default: "false"
  recursive:
    description: "When by-path is true, controls whether to recursively fetch parameters from sub-paths. Maps to the Recursive parameter of GetParametersByPath."
    required: false
    default: "true"

runs:
  using: "node24"
  main: "dist/index.js"
